<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFmpeg.wasm Revolution Command Center</title>
    <script>
        // 設定を先に読み込む！
        const coi = {
            shouldRegister: () => true,
            shouldDeregister: () => false,
            coepCredentialless: () => true, // これを有効にする
            doReload: () => window.location.reload(),
        };
    </script>
    <script src="https://unpkg.com/coi-serviceworker@0.1.7/coi-serviceworker.js"></script>
</head>
<body>
    <img id="logo" src="https://kakaomames.github.io/rei/logo.png" alt="Logo" style="width:100px;">
    <h1>FFmpeg.wasm 変換指令所</h1>
    <button id="convertBtn">変換開始（M3U8 -> MP4）</button>
    <div id="logBox" style="background:#000; color:#0f0; height:400px; overflow-y:scroll; font-family:monospace;"></div>

    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        
        // ログの取りこぼしを防ぐためにコンソールと画面に同時出力する
        const log = (msg) => {
            const logBox = document.getElementById('logBox');
            logBox.innerHTML += `<div>> ${msg}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
            console.log(msg);
        };

        const ffmpeg = createFFmpeg({ 
            log: true,
            logger: ({ message }) => log(message)
        });

        document.getElementById('convertBtn').addEventListener('click', async () => {
            try {
                log("侵食開始...FFmpegをロード中");
                await ffmpeg.load();
                log("ロード成功！ファイルをフェッチ...");

                const m3u8Url = 'https://kakaomames.github.io/ffmpeg-ytdl-test/stream.m3u8';
                ffmpeg.FS('writeFile', 'input.m3u8', await fetchFile(m3u8Url));
                
                log("変換実行...");
                await ffmpeg.run('-i', 'input.m3u8', '-c', 'copy', 'output.mp4');

                const data = ffmpeg.FS('readFile', 'output.mp4');
                const blob = new Blob([data.buffer], { type: 'video/mp4' });
                
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'revolution.mp4';
                link.innerText = "ダウンロード";
                document.body.appendChild(link);
                log("革命成功！");
            } catch (e) {
                log("【致命的エラー】: " + e.message);
                log("※ヒント：SharedArrayBuffer関連ならブラウザを完全リロードしろ！");
            }
        });
    </script>
</body>
</html>
